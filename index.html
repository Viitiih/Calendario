<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.set && descriptor.get && descriptor.configurable) {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Blocked attempt to overwrite window.fetch', v); },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {}
      })();
    </script>
    <script>
      // Registra Service Worker inline via Blob — sem precisar de arquivo sw.js separado
      if ("serviceWorker" in navigator) {
        var swCode = `
const CACHE_NAME = "worksync-v1";
const PRECACHE_ASSETS = ["./", "./index.html"];

self.addEventListener("install", (event) => {
  event.waitUntil(
    caches.open(CACHE_NAME).then((cache) => cache.addAll(PRECACHE_ASSETS))
  );
  self.skipWaiting();
});

self.addEventListener("activate", (event) => {
  event.waitUntil(
    caches.keys().then((keys) =>
      Promise.all(keys.filter((k) => k !== CACHE_NAME).map((k) => caches.delete(k)))
    )
  );
  self.clients.claim();
});

self.addEventListener("fetch", (event) => {
  const { request } = event;
  const url = new URL(request.url);
  if (request.method !== "GET") return;
  if (url.hostname.includes("firestore.googleapis.com")) return;
  if (url.hostname.includes("firebase.googleapis.com")) return;
  if (url.hostname.includes("identitytoolkit.googleapis.com")) return;
  if (url.hostname.includes("securetoken.googleapis.com")) return;
  if (request.mode === "navigate") {
    event.respondWith(
      fetch(request)
        .then((response) => {
          const clone = response.clone();
          caches.open(CACHE_NAME).then((cache) => cache.put(request, clone));
          return response;
        })
        .catch(() => caches.match("./index.html"))
    );
    return;
  }
  if (url.pathname.match(/\.(js|css|woff2?|png|svg|ico|webp|jpg)$/)) {
    event.respondWith(
      caches.match(request).then((cached) => {
        if (cached) return cached;
        return fetch(request).then((response) => {
          const clone = response.clone();
          caches.open(CACHE_NAME).then((cache) => cache.put(request, clone));
          return response;
        });
      })
    );
  }
});
`;
        var blob = new Blob([swCode], { type: "application/javascript" });
        var swUrl = URL.createObjectURL(blob);
        window.addEventListener("load", function() {
          navigator.serviceWorker.register(swUrl)
            .then(function(reg) { console.log("[SW] Registrado:", reg.scope); })
            .catch(function(err) { console.warn("[SW] Falha:", err); });
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
